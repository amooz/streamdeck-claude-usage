<!doctype html>
<html>
	<head lang="en">
		<title>Claude Usage Settings</title>
		<meta charset="utf-8" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>

	<body>
		<sdpi-item label="Display mode">
			<sdpi-select setting="displayMode" default="text">
				<option value="text">Text only</option>
				<option value="ring">Ring only</option>
				<option value="ring+text">Ring + text</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Data source">
			<sdpi-select setting="source" default="local-logs">
				<option value="local-logs">Local Claude Code logs</option>
				<option value="admin-api">Anthropic Admin API</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Project (local-logs)">
			<sdpi-textfield setting="project" default="all" placeholder="all"></sdpi-textfield>
		</sdpi-item>

		<sdpi-item label="Window">
			<sdpi-select setting="metricWindow" default="session5h">
				<option value="today">Today</option>
				<option value="session5h">5-hour session</option>
				<option value="weekly">Last 7 days</option>
				<option value="allTime">All time</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Model">
			<sdpi-select setting="metricModel" default="opus">
				<option value="all">All models</option>
				<option value="opus">Opus</option>
				<option value="sonnet">Sonnet</option>
				<option value="haiku">Haiku</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Metric">
			<sdpi-select setting="metricField" default="outputTokens">
				<option value="outputTokens">Output tokens</option>
				<option value="inputTokens">Input tokens</option>
				<option value="totalTokens">Total tokens</option>
				<option value="cacheReadTokens">Cache read tokens</option>
				<option value="cacheCreationTokens">Cache write tokens</option>
				<option value="requests">Requests</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Subscription tier">
			<sdpi-select setting="tier" default="max-20x">
				<option value="custom">Custom (no defaults)</option>
				<option value="api-only">API only (no session caps)</option>
				<option value="pro">Claude Pro</option>
				<option value="max-5x">Claude Max 5x</option>
				<option value="max-20x">Claude Max 20x</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Denominator (overrides tier)">
			<sdpi-textfield setting="denominator" placeholder="leave blank to use tier default"></sdpi-textfield>
		</sdpi-item>

		<sdpi-item label="Custom label (optional)">
			<sdpi-textfield setting="label" placeholder="auto"></sdpi-textfield>
		</sdpi-item>

		<sdpi-item label="Refresh (seconds)">
			<sdpi-textfield setting="refreshSeconds" default="60" placeholder="60"></sdpi-textfield>
		</sdpi-item>
	</body>
</html>
